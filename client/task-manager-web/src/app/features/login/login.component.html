<section class="card">
  <div class="lang-row" role="group" [attr.aria-label]="'login.langLabel' | translate">
    <span class="lang-label">{{ 'login.langLabel' | translate }}</span>
    <div class="lang-toggle">
      <button
        type="button"
        class="lang-btn"
        [class.active]="locale.lang() === 'en'"
        (click)="setLanguage('en')"
      >
        {{ 'login.langEn' | translate }}
      </button>
      <button
        type="button"
        class="lang-btn"
        [class.active]="locale.lang() === 'pt'"
        (click)="setLanguage('pt')"
      >
        {{ 'login.langPt' | translate }}
      </button>
    </div>
  </div>

  <h1>{{ 'login.title' | translate }}</h1>
  <p class="muted">
    {{ 'login.demoHint' | translate }}
    <code>demo&#64;taskmanager.local</code> / <code>Demo123!</code>
  </p>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label [class.has-error]="showField('email')">
      <span>{{ 'login.email' | translate }}</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="username"
        [attr.aria-invalid]="showField('email')"
        [attr.aria-describedby]="showField('email') ? 'err-email' : null"
      />
      @if (showField('email')) {
        <span id="err-email" class="field-errors" role="alert">
          @for (m of fieldMsgs('email'); track m) {
            <span class="field-error">{{ m }}</span>
          }
        </span>
      }
    </label>
    <label [class.has-error]="showField('password')">
      <span>{{ 'login.password' | translate }}</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="current-password"
        [attr.aria-invalid]="showField('password')"
        [attr.aria-describedby]="showField('password') ? 'err-password' : null"
      />
      @if (showField('password')) {
        <span id="err-password" class="field-errors" role="alert">
          @for (m of fieldMsgs('password'); track m) {
            <span class="field-error">{{ m }}</span>
          }
        </span>
      }
    </label>
    @if (apiError) {
      <p class="error banner" role="alert">{{ apiError }}</p>
    }
    <button type="submit" [disabled]="busy">{{ 'login.submit' | translate }}</button>
  </form>
  <p class="footer"><a routerLink="/register">{{ 'login.createAccount' | translate }}</a></p>
</section>
